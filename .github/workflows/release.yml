name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: 386
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch submodules
        run: |
          # spoof-tunnel is on GitHub — shallow clone is fine
          git submodule update --init --depth=1 spoof-tunnel
          # dnstt uses dumb HTTP which doesn't support shallow clones
          git submodule update --init --depth=1 vaydns

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: randomshitgobrr/go.mod

      - name: Set artifact names
        id: names
        run: |
          echo "client=randomshitgobrr-client-${{ matrix.goos }}-${{ matrix.goarch }}" >> "$GITHUB_OUTPUT"
          echo "server=randomshitgobrr-server-${{ matrix.goos }}-${{ matrix.goarch }}" >> "$GITHUB_OUTPUT"
          echo "scanner=randomshitgobrr-scanner-${{ matrix.goos }}-${{ matrix.goarch }}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: randomshitgobrr
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "${{ steps.names.outputs.client }}" ./cmd/client
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "${{ steps.names.outputs.server }}" ./cmd/server
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "${{ steps.names.outputs.scanner }}" ./cmd/scanner

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            randomshitgobrr/${{ steps.names.outputs.client }}
            randomshitgobrr/${{ steps.names.outputs.server }}
            randomshitgobrr/${{ steps.names.outputs.scanner }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist/

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
